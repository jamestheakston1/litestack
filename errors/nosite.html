<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Not Found | LiteStack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111111; }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-3xl shadow-sm">
                <i class="fas fa-search"></i>
            </div>
        </div>
        
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">Site Not Found</h1>
        <p class="text-gray-500 mb-10 leading-relaxed">
            The LiteStack site you are looking for doesn't exist, has been deleted, or the URL is incorrect.
        </p>

        <div class="space-y-3">
            <a href="https://litestack.pages.dev/" class="block w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                Go to LiteStack
            </a>
            <a href="javascript:history.back()" class="block w-full py-4 bg-white text-gray-700 font-bold rounded-2xl border border-gray-200 hover:bg-gray-50 transition">
                Go Back
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-gray-100">
            <div class="flex items-center justify-center space-x-2 opacity-40">
                <div class="w-6 h-6 bg-gray-400 rounded flex items-center justify-center">
                    <i class="fas fa-layer-group text-white text-[10px]"></i>
                </div>
                <span class="text-sm font-bold tracking-tight uppercase">LiteStack</span>
            </div>
        </div>
    </div>

</body>
</html>
