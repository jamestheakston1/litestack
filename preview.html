<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteStack | Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white overflow-hidden h-screen flex flex-col">

    <div class="flex-1 relative bg-white">
        <iframe id="previewFrame" class="w-full h-full border-none" src="about:blank"></iframe>
        <div id="loading" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-20">
            <i class="fas fa-circle-notch fa-spin text-blue-600 text-3xl mb-4"></i>
            <p class="text-sm font-medium text-gray-500">Loading Instance...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const site = urlParams.get('site');
        const page = urlParams.get('page') || 'index.html';
        const iframe = document.getElementById('previewFrame');
        const loading = document.getElementById('loading');

        if (!site) {
            window.location.href = '/errors/default404.html';
        }

        const projectUrl = `https://${site}.litestack.site/${page}`;

        iframe.src = projectUrl;

        iframe.onload = () => {
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 300);

            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;

                doc.addEventListener('click', (e) => {
                    const link = e.target.closest('a');
                    if (link && link.href) {
                        const href = link.getAttribute('href');
                        
                        if (!href.startsWith('http') && !href.startsWith('//') && !href.startsWith('mailto:') && !href.startsWith('#')) {
                            e.preventDefault();
                            
                            const cleanPage = href.split('?')[0].split('#')[0];
                            const currentParams = new URLSearchParams(window.location.search);
                            currentParams.set('page', cleanPage);
                            
                            window.location.href = window.location.pathname + '?' + currentParams.toString();
                        }
                    }
                }, true);

                doc.addEventListener('submit', (e) => {
                    const action = e.target.getAttribute('action');
                    if (action && !action.startsWith('http') && !action.startsWith('//')) {
                        e.preventDefault();
                        const currentParams = new URLSearchParams(window.location.search);
                        currentParams.set('page', action);
                        window.location.href = window.location.pathname + '?' + currentParams.toString();
                    }
                }, true);

            } catch (err) {
                console.warn('Cross-origin restriction or content error', err);
            }
        };

        function refreshPreview() {
            loading.style.display = 'flex';
            loading.style.opacity = '1';
            iframe.src = iframe.src;
        }
    </script>
</body>
</html>
