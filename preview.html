<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteStack | Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white overflow-hidden h-screen flex flex-col">

    <div class="flex-1 relative bg-white">
        <iframe id="previewFrame" class="w-full h-full border-none" src="about:blank"></iframe>
        <div id="loading" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-20">
            <i class="fas fa-circle-notch fa-spin text-blue-600 text-3xl mb-4"></i>
            <p class="text-sm font-medium text-gray-500">Loading Instance...</p>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://sykhfbuvevixbxfrbysa.supabase.co', 'sb_publishable_mocH3Iz2GQ_FQaB0d8LbEQ_szHXLp93');
        const urlParams = new URLSearchParams(window.location.search);
        const siteName = urlParams.get('site');
        const pageName = urlParams.get('page') || 'index.html';
        const iframe = document.getElementById('previewFrame');
        const loading = document.getElementById('loading');

        async function loadContent() {
            if (!siteName) {
                window.location.href = '/errors/nosite.html';
                return;
            }

            try {
                const { data: project, error: pError } = await supabaseClient
                    .from('projects')
                    .select('id')
                    .eq('name', siteName)
                    .single();

                if (pError || !project) {
                    window.location.href = '/errors/nosite.html';
                    return;
                }

                const { data: files, error: fError } = await supabaseClient
                    .from('project_files')
                    .select('name, content')
                    .eq('project_id', project.id);

                if (fError || !files || files.length === 0) {
                    window.location.href = '/errors/default404.html?site=' + siteName;
                    return;
                }

                const requestedFile = files.find(f => f.name.toLowerCase() === pageName.toLowerCase());

                if (requestedFile) {
                    renderToIframe(requestedFile.content);
                } else {
                    const custom404 = files.find(f => f.name.toLowerCase() === '404.html');
                    if (custom404) {
                        renderToIframe(custom404.content);
                    } else {
                        window.location.href = `/errors/default404.html?site=${siteName}`;
                    }
                }
            } catch (err) {
                console.error(err);
                window.location.href = '/errors/default404.html';
            }
        }

        function renderToIframe(content) {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(content);
            doc.close();

            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 300);

            doc.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (link) {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('mailto:') && !href.startsWith('#')) {
                        e.preventDefault();
                        const cleanPage = href.split('?')[0].split('#')[0];
                        const currentParams = new URLSearchParams(window.location.search);
                        currentParams.set('page', cleanPage);
                        window.location.href = window.location.pathname + '?' + currentParams.toString();
                    }
                }
            }, true);
        }

        loadContent();
    </script>
</body>
</html>
