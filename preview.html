<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteStack | Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #passwordOverlay, #restrictionOverlay { z-index: 1000; backdrop-filter: blur(8px); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[900] transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <i class="fas fa-circle-notch loading-spin text-blue-600 text-3xl mb-4"></i>
            <p id="loadingText" class="text-sm font-bold text-gray-400 uppercase tracking-widest">Please wait...</p>
        </div>
    </div>

    <div id="passwordOverlay" class="hidden fixed inset-0 bg-white/90 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-900 mb-2">Protected Site</h2>
            <p class="text-gray-500 mb-8">This site requires a password to view.</p>
            <div class="space-y-4">
                <input type="password" id="sitePassword" placeholder="Enter password" class="w-full px-6 py-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-600 outline-none text-center font-bold">
                <div id="passwordError" class="hidden text-sm font-bold text-red-600 bg-red-50 border border-red-100 rounded-2xl px-4 py-3"></div>
                <button onclick="checkPassword()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition shadow-xl shadow-blue-100">Unlock Site</button>
            </div>
        </div>
    </div>

    <div id="restrictionOverlay" class="hidden fixed inset-0 bg-white flex items-center justify-center p-6 text-center">
        <div class="max-w-md">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6">
                <i class="fas fa-mobile-slash"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-900 mb-2">Device Restricted</h2>
            <p class="text-gray-500">The owner has restricted access to this site on your current device type.</p>
        </div>
    </div>

    <iframe id="previewFrame" class="w-full h-full border-none hidden"></iframe>

    <script>
        const supabaseClient = supabase.createClient('https://sykhfbuvevixbxfrbysa.supabase.co', 'sb_publishable_mocH3Iz2GQ_FQaB0d8LbEQ_szHXLp93');
        const urlParams = new URLSearchParams(window.location.search);
        const siteName = urlParams.get('site');
        const pageName = urlParams.get('page') || 'index.html';

        let siteConfig = {
            description: "",
            faviconUrl: "",
            themeColor: "#2563eb",
            password: "",
            devices: { mobile: true, tablet: true, desktop: true },
            loadingText: "Please wait...",
            showLoader: true,
            customHeadHtml: "",
            injectCss: "",
            injectJs: ""
        };

        async function initPreview() {
            if (!siteName) {
                window.location.href = '/errors/nosite.html';
                return;
            }

            const { data: project, error: pError } = await supabaseClient
                .from('projects')
                .select('id')
                .eq('name', siteName)
                .single();

            if (!project) {
                window.location.href = '/errors/nosite.html';
                return;
            }

            const { data: files, error: fError } = await supabaseClient
                .from('project_files')
                .select('name, content')
                .eq('project_id', project.id);

            const configFile = files.find(f => f.name.toLowerCase() === 'config.json');
            if (configFile) {
                try {
                    const parsed = JSON.parse(configFile.content);
                    siteConfig = { ...siteConfig, ...parsed };
                } catch (e) {
                    console.error("Config error", e);
                }
            }

            // Apply outer page head (favicon/themeColor), then set title from page HTML.
            applyOuterPageHead();

            if (!isDeviceAllowed()) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('restrictionOverlay').classList.remove('hidden');
                return;
            }

            if (siteConfig.password !== "" && !sessionStorage.getItem(`auth_${siteName}`)) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('passwordOverlay').classList.remove('hidden');
                return;
            }

            renderPage(files);
        }

        function applyOuterPageHead() {
            const themeColor = (siteConfig.themeColor || '').trim();
            if (themeColor) {
                let meta = document.querySelector('meta[name="theme-color"]');
                if (!meta) {
                    meta = document.createElement('meta');
                    meta.setAttribute('name', 'theme-color');
                    document.head.appendChild(meta);
                }
                meta.setAttribute('content', themeColor);
            }

            const faviconUrl = (siteConfig.faviconUrl || '').trim();
            if (faviconUrl) {
                let link = document.querySelector('link[rel="icon"]');
                if (!link) {
                    link = document.createElement('link');
                    link.setAttribute('rel', 'icon');
                    document.head.appendChild(link);
                }
                link.setAttribute('href', faviconUrl);
            }
        }

        function extractTitleFromHtml(html) {
            const s = String(html ?? '');
            const match = s.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            if (!match) return '';
            // Strip tags inside title if any
            return String(match[1] ?? '').replace(/<[^>]+>/g, '').trim();
        }

        function applyOuterTitleFromHtml(html) {
            const title = extractTitleFromHtml(html);
            document.title = title || 'LiteStack | Preview';
        }

        function isDeviceAllowed() {
            const width = window.innerWidth;
            let currentDevice = 'desktop';
            if (width < 768) currentDevice = 'mobile';
            else if (width < 1024) currentDevice = 'tablet';
            
            return siteConfig.devices[currentDevice] !== false;
        }

        function checkPassword() {
            const val = document.getElementById('sitePassword').value;
            if (val === siteConfig.password) {
                sessionStorage.setItem(`auth_${siteName}`, "true");
                document.getElementById('passwordOverlay').classList.add('hidden');
                initPreview();
            } else {
                const err = document.getElementById('passwordError');
                if (err) {
                    err.innerText = "Incorrect password";
                    err.classList.remove('hidden');
                }
            }
        }

        function renderPage(files) {
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const frame = document.getElementById('previewFrame');

            if (!siteConfig.showLoader) {
                loading.style.display = 'none';
            } else {
                loadingText.innerText = siteConfig.loadingText;
            }

            function finishLoading() {
                if (!siteConfig.showLoader) {
                    frame.classList.remove('hidden');
                    return;
                }
                setTimeout(() => {
                    loading.style.opacity = '0';
                    frame.classList.remove('hidden');
                    setTimeout(() => loading.style.display = 'none', 500);
                }, 300);
            }

            const targetFile = files.find(f => f.name.toLowerCase() === pageName.toLowerCase());
            
            if (!targetFile) {
                const custom404 = files.find(f => f.name.toLowerCase() === '404.html');
                if (custom404) {
                    writeToFrame(custom404.content);
                    applyOuterTitleFromHtml(custom404.content);
                    finishLoading();
                } else {
                    window.location.href = `/errors/default404.html?site=${siteName}`;
                }
                return;
            }

            writeToFrame(targetFile.content);
            applyOuterTitleFromHtml(targetFile.content);
            finishLoading();
        }

        function writeToFrame(content) {
            const frame = document.getElementById('previewFrame');
            const doc = frame.contentDocument || frame.contentWindow.document;

            const enhanced = enhanceHtml(content);
            doc.open();
            doc.write(enhanced);
            doc.close();

            doc.addEventListener('click', (e) => {
                const a = e.target.closest('a');
                if (a && a.getAttribute('href')) {
                    const href = a.getAttribute('href');
                    if (!href.startsWith('http') && !href.startsWith('//') && !href.startsWith('#')) {
                        e.preventDefault();
                        const newParams = new URLSearchParams(window.location.search);
                        newParams.set('page', href);
                        window.location.href = window.location.pathname + '?' + newParams.toString();
                    }
                }
            });
        }

        function escapeHtmlAttr(val) {
            return String(val ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function enhanceHtml(rawHtml) {
            const html = String(rawHtml ?? '');
            const headBits = [];

            const description = (siteConfig.description || '').trim();
            const themeColor = (siteConfig.themeColor || '').trim();
            const faviconUrl = (siteConfig.faviconUrl || '').trim();

            if (description) headBits.push(`<meta name="description" content="${escapeHtmlAttr(description)}">`);
            if (themeColor) headBits.push(`<meta name="theme-color" content="${escapeHtmlAttr(themeColor)}">`);
            if (faviconUrl) headBits.push(`<link rel="icon" href="${escapeHtmlAttr(faviconUrl)}">`);

            const gsc = (siteConfig.googleSiteVerification || '').trim();
            if (gsc) headBits.push(`<meta name="google-site-verification" content="${escapeHtmlAttr(gsc)}">`);

            const extraMeta = (siteConfig.extraMetaTags || '').trim();
            if (extraMeta) headBits.push(`${extraMeta}`);

            if ((siteConfig.injectCss || '').trim()) {
                headBits.push(`<style>\n${siteConfig.injectCss}\n</style>`);
            }

            if ((siteConfig.customHeadHtml || '').trim()) {
                headBits.push(`${siteConfig.customHeadHtml}`);
            }

            const injection = headBits.length ? `\n<!-- LiteStack config injection -->\n${headBits.join('\n')}\n` : '';

            let out = html;
            if (injection) {
                if (/<\/head>/i.test(out)) out = out.replace(/<\/head>/i, injection + '</head>');
                else out = `<!doctype html><html><head>${injection}</head><body>${out}</body></html>`;
            }

            const injectJs = (siteConfig.injectJs || '').trim();
            if (injectJs) {
                const scriptTag = `\n<script>\n${injectJs}\n</scr` + `ipt>\n`;
                if (/<\/body>/i.test(out)) out = out.replace(/<\/body>/i, scriptTag + '</body>');
                else out += scriptTag;
            }

            return out;
        }

        initPreview();
    </script>
</body>
</html>
