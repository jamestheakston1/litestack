<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Site...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        .error-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #f9fafb; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="status" class="error-container">
        <div class="loader"></div>
        <p>Loading your LiteStack site...</p>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://sykhfbuvevixbxfrbysa.supabase.co', 'sb_publishable_mocH3Iz2GQ_FQaB0d8LbEQ_szHXLp93');

        async function loadSite() {
            const urlParams = new URLSearchParams(window.location.search);
            const siteName = urlParams.get('site');
            const pageName = urlParams.get('page') || 'index.html';

            if (!siteName) {
                window.location.href = 'errors/nosite.html';
                return;
            }

            const { data: project, error: pError } = await supabaseClient
                .from('projects')
                .select('id')
                .eq('name', siteName)
                .single();

            if (pError || !project) {
                window.location.href = 'errors/nosite.html';
                return;
            }

            const { data: files, error: fError } = await supabaseClient
                .from('project_files')
                .select('name, content')
                .eq('project_id', project.id);

            if (fError || !files || files.length === 0) {
                window.location.href = 'errors/default404.html';
                return;
            }

            const requestedFile = files.find(f => f.name.toLowerCase() === pageName.toLowerCase());

            if (requestedFile) {
                renderContent(requestedFile.content);
            } else {
                const custom404 = files.find(f => f.name.toLowerCase() === '404.html');
                if (custom404) {
                    renderContent(custom404.content);
                } else {
                    window.location.href = 'errors/default404.html';
                }
            }
        }

        function renderContent(content) {
            document.open();
            document.write(content);
            document.close();
        }

        loadSite();
    </script>
</body>
</html>
