<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="text-center px-4">
        <div class="mb-8">
            <i class="fas fa-compass text-9xl text-indigo-600"></i>
        </div>
        <h1 class="text-9xl font-extrabold text-gray-800">404</h1>
        <p class="text-2xl md:text-3xl font-light text-gray-600 mt-4">
            Oops! You've wandered into the unknown.
        </p>
        <p class="text-gray-500 mt-2 mb-8">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="/" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition duration-300 ease-in-out flex items-center justify-center">
                <i class="fas fa-home mr-2"></i> Take Me Home
            </a>
            <a href="javascript:history.back()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-8 rounded-lg transition duration-300 ease-in-out flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i> Go Back
            </a>
        </div>
        <div class="mt-12 text-gray-400">
            <p>Or try searching for something else:</p>
            <div class="mt-4 relative max-w-xs mx-auto">
                <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <div class="absolute left-3 top-2.5 text-gray-400">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
