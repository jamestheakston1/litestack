<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LiteStack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111111; }
        .gradient-text {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center">
        <div class="mb-8 relative">
            <h1 class="text-9xl font-black text-gray-100 select-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl rotate-12 flex items-center justify-center shadow-xl shadow-blue-200">
                    <i class="fas fa-layer-group text-white text-3xl -rotate-12"></i>
                </div>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-gray-900 mb-4">Lost in the stack?</h2>
        <p class="text-gray-500 mb-10 leading-relaxed">
            The page you're looking for doesn't exist or has been moved to a different deployment.
        </p>

        <div class="space-y-3">
            <a href="/" class="block w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                <i class="fas fa-home mr-2"></i> Return to Dashboard
            </a>
            <button onclick="history.back()" class="block w-full py-4 bg-white text-gray-700 font-bold rounded-2xl border border-gray-200 hover:bg-gray-50 transition">
                <i class="fas fa-arrow-left mr-2"></i> Go Back
            </button>
        </div>

        <div class="mt-12 pt-8 border-t border-gray-100">
            <div class="flex items-center justify-center space-x-2 opacity-40">
                <div class="w-6 h-6 bg-gray-400 rounded flex items-center justify-center">
                    <i class="fas fa-layer-group text-white text-[10px]"></i>
                </div>
                <span class="text-sm font-bold tracking-tight uppercase">LiteStack</span>
            </div>
        </div>
    </div>

</body>
</html>
